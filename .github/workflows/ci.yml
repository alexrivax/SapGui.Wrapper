name: PR Validation

# Runs on every pull request targeting main.
# The release workflow (publish.yml) handles deployment after merge.
on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: windows-latest   # net461 target requires Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history – needed for SourceLink

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Restore
        run: dotnet restore SapGui.Wrapper.sln

      - name: Build
        run: dotnet build SapGui.Wrapper.sln -c Release --no-restore

      - name: Test
        run: >-
          dotnet test SapGui.Wrapper.Tests/SapGui.Wrapper.Tests.csproj
          -c Release
          --no-build
          --filter "FullyQualifiedName!~Integration"
          --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
          retention-days: 7

      # Dry-run pack – verifies the package builds cleanly without publishing
      - name: Pack (dry-run)
        run: >-
          dotnet pack SapGui.Wrapper/SapGui.Wrapper.csproj
          -c Release
          --no-build
          -o ./ci-nupkg

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            ci-nupkg/*.nupkg
            ci-nupkg/*.snupkg
          retention-days: 7
