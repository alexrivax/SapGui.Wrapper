name: Docs

# Rebuild and redeploy the GitHub Pages site on every push to main,
# or trigger it manually from the Actions tab.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    runs-on: windows-latest # net461 target requires Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for SourceLink & git blame in docs

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Build project (generates XML documentation file)
        run: >-
          dotnet build SapGui.Wrapper/SapGui.Wrapper.csproj
          -c Release
          -p:GenerateDocumentationFile=true

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Generate docs site
        run: docfx docs/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
